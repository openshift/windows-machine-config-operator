apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/openshift/windows-machine-config-operator?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: '3'
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request"
      && target_branch == "master"
      && files.all.exists(x, x.matches('^Containerfile.windows-test$'))
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: windows-machine-config-operator-release-5-0
    appstudio.openshift.io/component: windows-container-test
    pipelines.appstudio.openshift.io/type: build
  name: windows-container-test-on-pull-request
  namespace: windows-machine-conf-tenant
spec:
  params:
  - name: hermetic
    value: 'true'
  - name: build-source-image
    value: 'false'
  - name: prefetch-input
    value: ''
  - name: dockerfile
    value: Containerfile.windows-test
  - name: git-url
    value: '{{source_url}}'
  - name: image-expires-after
    value: 5d
  - name: output-image
    value: quay.io/redhat-user-workloads/windows-machine-conf-tenant/windows-container-test/windows-container-test:on-pr-{{revision}}
  - name: revision
    value: '{{revision}}'
  - name: build-platforms
    value: linux/amd64,windows/amd64
  pipelineRef:
    name: docker-build
    bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:devel
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
