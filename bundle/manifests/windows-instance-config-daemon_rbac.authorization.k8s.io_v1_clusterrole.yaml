apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  creationTimestamp: null
  name: windows-instance-config-daemon
rules:
# Bootstrap permissions - minimal access for initial setup
- apiGroups:
  - ""
